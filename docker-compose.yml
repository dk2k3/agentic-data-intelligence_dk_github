services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agentic-api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ollama
    environment:
      DATABASE_URL: postgresql+psycopg2://agentic:agentic@db:5432/agentic_db
      OLLAMA_HOST: http://ollama:11434
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: agentic-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      BACKEND_URL: http://api:8000
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: agentic-db
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: agentic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
